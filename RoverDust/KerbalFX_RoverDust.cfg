KERBALFX_ROVER_DUST
{
  // Overall Rover Dust amount. Higher value = more dust.
  EmissionMultiplier = 2.55

  // Rover Dust particle budget.
  // Higher value = denser wheel trails.
  MaxParticlesMultiplier = 1.70

  // Overall Rover Dust trail width.
  RadiusScaleMultiplier = 1.38

  // How strongly big wheels get extra dust.
  // Higher value = large wheels look much dustier.
  WheelBoostPower = 1.72

  // Safety limit for very large wheels.
  WheelBoostMax = 6.20

  // How strongly light affects Rover Dust amount.
  // Lower value = dust stays more visible at low sun angles.
  LightRateExponent = 1.05

  // How strongly light affects Rover Dust opacity.
  // Lower value = dust stays less transparent in low light.
  LightAlphaExponent = 1.25

  // Minimum combined light before Rover Dust becomes visible.
  MinCombinedLight = 0.040

  // Sun fallback contribution while vessel is in terrain shadow.
  ShadowLightFactor = 0.20

  // Daylight safety floor for Rover Dust amount.
  // Prevents over-darkening when sun angle is low.
  DaylightRateFloor = 0.42

  // Daylight safety floor for Rover Dust opacity.
  // Prevents over-fading when sun angle is low.
  DaylightAlphaFloor = 0.40

  // Per-body Rover Dust visibility multipliers.
  // Edit values and save: changes apply in-flight (no restart needed).

  // Rover Dust visibility on Duna.
  BODY_VISIBILITY
  {
    name = Duna
    multiplier = 1.00
  }

  // Rover Dust visibility on Mun.
  BODY_VISIBILITY
  {
    name = Mun
    multiplier = 1.65
  }

