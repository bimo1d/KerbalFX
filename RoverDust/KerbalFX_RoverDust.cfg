KERBALFX_ROVER_DUST
{
  // Overall dust amount. Higher value = more dust.
  EmissionMultiplier = 2.55

  // How many particles can exist at the same time.
  // Higher value = denser dust trail.
  MaxParticlesMultiplier = 1.70

  // Overall dust trail width.
  RadiusScaleMultiplier = 1.38

  // How strongly big wheels get extra dust.
  // Higher value = large wheels look much dustier.
  WheelBoostPower = 1.72

  // Safety limit for very large wheels.
  WheelBoostMax = 6.20

  // How much light affects dust amount.
  // Lower value = dust stays more visible when sun is low.
  LightRateExponent = 1.05

  // How much light affects dust opacity.
  // Lower value = dust stays less transparent in low light.
  LightAlphaExponent = 1.25

  // Minimum total light needed for dust to appear.
  MinCombinedLight = 0.040

  // Sun contribution while vessel is in shadow.
  ShadowLightFactor = 0.20

  // Daytime safety floor for dust amount.
  // Prevents dust from disappearing too much at low sun angles.
  DaylightRateFloor = 0.42

  // Daytime safety floor for dust opacity.
  // Prevents dust from becoming too transparent at low sun angles.
  DaylightAlphaFloor = 0.40

