// KerbalFX AeroFX runtime config.
//
// BODY_VISIBILITY — per-body intensity multiplier for the aerodynamic ribbon effect.
//             `multiplier`: 1.00 = default, >1 stronger, <1 lighter.
//
// LIGHT_AWARE — per-body curve for the Light-aware effects system.
//             All fields are optional.
//             `dark_scale`      0..1. Alpha multiplier on the night side.
//             `bright_scale`    0..2. Alpha multiplier under full sun. 1.00 = default.
//             `twilight_floor`  0..1. Minimum alpha multiplier in low-sun / sunset.
//             `min_perceived`   0..1. Lower bound of perceived brightness mapping.
//             `color_tint`      0..1. How strongly the ribbon takes on the
//                               dominant illumination color.
//
// PART_IGNORE — exclude parts from ribbon anchor calculations by part name.
//             All fields are optional.
//             `name`   exact partInfo.name match (case-insensitive).
//             `match`  case-insensitive substring match in partInfo.name.
//             At least one of `name` or `match` is required per entry.
//
// Stock bodies are configured in code with sensible defaults, entries here only override them.
// Hot-reload is supported — you do not need to restart your game after making changes.

KERBALFX_AERO_FX
{
  BODY_VISIBILITY
  {
    name = Kerbin
    multiplier = 1.00
  }
}
