// KerbalFX BlastFX runtime config.
//
// ===== Module =====
//             `EnableModule`                              true/false. Master switch for the runtime side of BlastFX.
//             `TargetPartNamePrefix`                      Part-name prefix used to identify TS-* shroud / ring parts that
//                                                         must be hidden after a stage detach.
//             `DespawnDetachedRingVessel`                 true/false. Despawn the lone ring vessel that KSP leaves behind
//                                                         when an auto-shroud detaches.
//             `HideDetachedRingVisualImmediately`         true/false. Hide the ring mesh on detach without waiting for the
//                                                         despawn delay.
//             `SmartHiddenRingCleanup`                    true/false. Periodically destroy hidden ring vessels that drift
//                                                         far from the active craft.
//
// ===== KCS prefab vacuum explosions =====
//             `EnableVacuumExplosions`                    true/false. Spawn the KCS prefab explosion in
//                                                         vacuum freefall instead of the stock FX.
//             `VacuumExplosionBundle`                     AssetBundle file name under
//                                                         `GameData/KerbalFX/BlastFX/AssetBundles/`.
//             `VacuumExplosionPrefab`                     Prefab name inside the bundle.
//             `VacuumExplosionReturnDelay`                1..60 s. Pool slot return delay.
//             `VacuumExplosionPreload`                    true/false. Load the bundle as soon as the flight scene starts.
//             `VacuumExplosionPrewarmSlots`               0..12. Slots to build during preload.
//             `VacuumExplosionRateLimit`                  0..20. Max overlapping spawns within `LimitRadius` /
//                                                         `LimitTime`. 0 disables the limiter.
//             `VacuumExplosionLimitRadius`                0.5..50 m. Proximity radius used by rate-limit and merge.
//             `VacuumExplosionLimitTime`                  0.1..5 s. Time window used by rate-limit.
//             `VacuumExplosionMergeMaxSpeedDiff`          0..1000 m/s. Merge near-coincident events whose relative speed
//                                                         is below this threshold.
//             `VacuumExplosionWarmupDraw`                 true/false. Run an invisible draw of the prefab on first load
//                                                         to compile shaders and warm up Unity.
//             `VacuumExplosionRequireEligibleFuelPart`    true/false. Require a fuel-bearing, engine, or command part to
//                                                         spawn the prefab — skip dry structural parts.
//             `VacuumExplosionMinFuelReserve`             0..10000. Minimum total fuel resource amount required when
//                                                         the eligibility gate is on.
//
// ===== Bundle debris pool =====
//             `UseBundleVacuumDebrisMaterial`             true/false. Clone debris particles from the bundle prefab for
//                                                         the BlastFX pool. Falls back to a procedural cloud if the
//                                                         bundle is unavailable.
//             `VacuumDebrisMaterialTransform`             Name of the transform inside the prefab to clone for the
//                                                         debris pool.
//
// Hot-reload is supported — you do not need to restart your game after making changes.

KERBALFX_BLAST_FX
{
  EnableModule = true
  TargetPartNamePrefix = TS-
  DespawnDetachedRingVessel = true
  HideDetachedRingVisualImmediately = true
  SmartHiddenRingCleanup = true
  EnableVacuumExplosions = true
  VacuumExplosionBundle = kcseffects
  VacuumExplosionPrefab = Explosion
  VacuumExplosionReturnDelay = 15
  VacuumExplosionPreload = true
  VacuumExplosionPrewarmSlots = 2
  VacuumExplosionWarmupDraw = true
  VacuumExplosionRequireEligibleFuelPart = true
  VacuumExplosionMinFuelReserve = 0.01
  UseBundleVacuumDebrisMaterial = true
  VacuumDebrisMaterialTransform = Debris
  VacuumExplosionRateLimit = 3
  VacuumExplosionLimitRadius = 3
  VacuumExplosionLimitTime = 0.9
  VacuumExplosionMergeMaxSpeedDiff = 160
}
