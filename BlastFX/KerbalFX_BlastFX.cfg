KERBALFX_BLAST_FX
{
  // Master switch for the BlastFX runtime.
  EnableModule = true

  // Targeting rule: only parts with this prefix will trigger BlastFX.
  TargetPartNamePrefix = TS-

  // Detached-ring cleanup behavior after separation.
  DespawnDetachedRingVessel = true
  HideDetachedRingVisualImmediately = true
  DespawnDelaySeconds = 0.35

  // Cleanup for hidden detached rings preserved for auto-shroud visuals.
  SmartHiddenRingCleanup = true
  HiddenRingCleanupIntervalSeconds = 2.0
  HiddenRingCleanupDistanceMeters = 1200
  HiddenRingMaxLifetimeSeconds = 180
}
