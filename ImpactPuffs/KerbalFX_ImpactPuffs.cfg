KERBALFX_IMPACT_PUFFS
{
  // Master amount for all Impact Puffs effects.
  // Higher value = denser dust from engines and landing impacts.
  EmissionMultiplier = 1.95

  // Global particle budget for this module.
  // Higher value = fuller looking puffs, lower value = better FPS.
  MaxParticlesMultiplier = 2.35

  // Global particle size scale.
  // Higher value = larger and more visible puffs.
  RadiusScaleMultiplier = 1.72

  // How far from the engine nozzle we search for terrain.
  // Larger values improve tall-lander support, but can add extra ray checks.
  MaxRayDistance = 42

  // Minimum engine output needed before plume-ground puffs start.
  // Lower value = effects appear earlier at low throttle.
  MinNormalizedThrust = 0.05

  // Sun-shadow fallback for daytime readability.
  // Higher value = dust stays more visible in terrain shadow.
  ShadowLightFactor = 0.28

  // Horizontal spread on the ground from engine plume pressure.
  // Higher value = wider dust ring flowing to the sides.
  LateralSpreadMultiplier = 2.40

  // Vertical lift inside the dust cloud.
  // Higher value = cloud rises more instead of staying ground-hugging.
  VerticalLiftMultiplier = 0.88

  // Turbulence amount for moving smoke-like dust motion.
  TurbulenceMultiplier = 1.45

  // Additional radial expansion for ring-like blast flow.
  RingExpansionMultiplier = 1.55

  // Side-to-side flow variation.
  // Higher value = stronger dynamic directional wobble in the plume.
  DynamicSwayMultiplier = 1.65

  // Per-engine damping for clustered stacks.
  // Higher exponent = stronger reduction per engine in multi-engine vessels.
  EngineCountExponent = 0.72

  // Lower clamp for per-engine damping.
  // Prevents very large clusters from becoming fully invisible.
  EngineCountMinScale = 0.22

  // Minimum alignment between nozzle exhaust direction and ground direction.
  // Higher value = fewer false positives when the engine is not pointed at the surface.
  MinExhaustToGroundAlignment = 0.18

  // Minimum alignment between the test ray and planetary down direction.
  // Higher value = stricter rejection of side/upward rays (reduces in-flight false triggers).
  MinRayDirectionToBodyDown = 0.05

  // Minimum alignment between nozzle axis and planetary down.
  // Prevents puffs when the vessel is heavily tilted and the plume is not directed to the surface.
  MinExhaustToBodyDown = 0.24

  // Thrust reference in kN for power scaling.
  // Engines stronger than this value produce proportionally stronger puffs.
  ThrustPowerReference = 180

  // Exponent for thrust power scaling.
  // Higher value = stronger separation between weak and powerful engines.
  ThrustPowerExponent = 0.60

  // Clamp range for thrust power scaling.
  ThrustPowerMinScale = 0.35
  ThrustPowerMaxScale = 3.80

  // Near-ground distance gate at low thrust.
  // Engine puffs stop if the nozzle is farther than this distance at low throttle.
  MaxDistanceAtLowThrust = 6.5

  // Near-ground distance gate at high thrust.
  // Engine puffs stop if the nozzle is farther than this distance at high throttle.
  MaxDistanceAtHighThrust = 30.0

  // Launchsite surfaces are currently excluded on purpose.
  // This avoids unstable behavior on launch pads while the volumetric path is being refined.

  // Minimum vertical speed for one-shot touchdown burst.
  // Higher value = only harder landings trigger impact burst.
  TouchdownMinSpeed = 2.2

  // Strength of the one-shot touchdown burst.
  TouchdownBurstMultiplier = 3.00

  // Per-body visual multiplier.
  // Use this when one celestial body looks too weak or too strong.
  BODY_VISIBILITY
  {
    name = Kerbin
    multiplier = 1.00
  }

  BODY_VISIBILITY
  {
    name = Mun
    multiplier = 1.22
  }

  BODY_VISIBILITY
  {
    name = Minmus
    multiplier = 1.18
  }

  BODY_VISIBILITY
  {
    name = Duna
    multiplier = 1.00
  }

  BODY_VISIBILITY
  {
    name = Ike
    multiplier = 1.06
  }

  BODY_VISIBILITY
  {
    name = Eve
    multiplier = 1.08
  }

  BODY_VISIBILITY
  {
    name = Moho
    multiplier = 1.10
  }

  BODY_VISIBILITY
