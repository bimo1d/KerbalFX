// KerbalFX ImpactPuffs runtime config.
//
// BODY_VISIBILITY — per-body alpha/density multiplier for engine plume puffs and touchdown bursts.
//             `multiplier`: 1.00 = default visibility, >1 denser.
//
// BODY_TINT — per-body override for the Surface Color Adaptation system.
//             All fields are optional.
//             `color`           R, G, B (each 0..1). Used as fallback tint when the
//                               biome map has no usable color for that body.
//                               Stock bodies already have sensible defaults in the plugin,
//                               so you only need this for planet packs without biome maps.
//             `strength`        0..4. Multiplier on the surface tint blend strength for this
//                               body. 1.00 = default, 2.00 = twice as strong, 0.00 =
//                               disable surface tint completely on this body.
//                               Useful when the biome map gives a desaturated
//                               color and you want a more pronounced effect.
//             `override_biome`  true/false. Default (false) keeps biome-map colors
//                               first and uses `color` only as fallback. True forces
//                               `color` to override biome-map colors for that body.
//
// LIGHT_AWARE — per-body curve for the Light-aware system.
//              All fields are optional.
//             `dark_scale`      0..1. Alpha multiplier in pitch-dark conditions.
//                               Lower values mean plumes nearly disappears at night.
//             `bright_scale`    0..2. Alpha multiplier under full sun. 1.00 = default.
//             `twilight_floor`  0..1. Minimum alpha multiplier when in indirect light
//                               (crater, low sun) — keeps plumes visible from
//                               ambient skylight rather than going pure dark.
//             `min_perceived`   0..1. Lower bound of perceived brightness mapped to
//                               `dark_scale`. Tweak for stronger contrast.
//             `color_tint`      0..1. How strongly puffs take on the dominant
//                               illumination color (sun + ambient).
//
// Stock bodies are configured in code with sensible defaults, entries here only override them.
// For modded bodies start with `strength` if you unsure whether it has biome maps or not.
// Hot-reload is supported — you do not need to restart your game after making changes.

KERBALFX_IMPACT_PUFFS
{
  BODY_VISIBILITY
  {
    name = Duna
    multiplier = 1.00
  }
  BODY_VISIBILITY
  {
    name = Plock
    multiplier = 1.10
  }

  BODY_TINT
  {
    name = Duna
    color = 0.78, 0.46, 0.32
    strength = 1.00
    override_biome = false
  }
  BODY_TINT
  {
    name = Plock
    color = 0.85, 0.80, 0.70
    strength = 2.00
    override_biome = false
  }
}
